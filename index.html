<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>🍎 兒童學習冒險王</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');
        body { font-family: 'Fredoka', sans-serif; background: #f0f4f8; }
        .card { transition: all 0.2s; cursor: pointer; }
        .card:hover { transform: scale(1.02); }
        .fade-in { animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-teal-700">🍎 學習冒險</h1>
            <div id="score-bar" class="hidden text-xl font-bold text-orange-500 bg-white px-6 py-2 rounded-full shadow-md">
                🥕 紅蘿蔔: <span id="score">0</span>
            </div>
        </div>

        <div id="nav-container" class="space-y-6">
            <div id="grade-panel" class="bg-white p-6 rounded-3xl shadow-lg border-t-8 border-blue-400">
                <h2 class="text-xl font-bold mb-4">🎒 1. 年級</h2>
                <div id="grade-list" class="grid grid-cols-2 gap-4"></div>
            </div>
            <div id="subject-panel" class="hidden bg-white p-6 rounded-3xl shadow-lg border-t-8 border-orange-400">
                <h2 class="text-xl font-bold mb-4">📚 2. 科目</h2>
                <div id="subject-list" class="grid grid-cols-2 gap-4"></div>
            </div>
            <div id="topic-panel" class="hidden bg-white p-6 rounded-3xl shadow-lg border-t-8 border-green-400">
                <h2 class="text-xl font-bold mb-4">🎯 3. 課題</h2>
                <div id="topic-list" class="grid grid-cols-1 gap-4"></div>
            </div>
        </div>

        <div id="quiz-zone" class="hidden bg-white p-8 rounded-3xl shadow-xl fade-in">
            <button onclick="location.reload()" class="mb-6 px-6 py-2 bg-gray-100 rounded-full font-bold hover:bg-gray-200">⬅️ 返回選單</button>
            <div id="quiz-content"></div>
            <div id="feedback" class="mt-6 text-center font-bold text-2xl h-10"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx6sc4HQAhdyZpKCYcMdvS8HuUgvTgmuvhJTfzgMi33csL7YF82jOoGvtHnEAf-SHoC/exec";
        let fullCurriculum = [], score = 0, currentQuestions = [];

        // 初始化：讀取 Curriculum
        fetch(API_URL + "?sheet=Curriculum").then(res => res.json()).then(data => {
            fullCurriculum = data;
            const grades = [...new Set(data.map(r => r.Grade))];
            document.getElementById('grade-list').innerHTML = grades.map(g => 
                `<button onclick="selectGrade('${g}')" class="card bg-blue-50 p-4 rounded-2xl font-bold border-2 border-blue-200">${g}</button>`
            ).join('');
        });

        function selectGrade(grade) {
            document.getElementById('subject-panel').classList.remove('hidden');
            const subs = [...new Set(fullCurriculum.filter(r => r.Grade === grade).map(r => r.Subject))];
            document.getElementById('subject-list').innerHTML = subs.map(s => 
                `<button onclick="selectTopic('${grade}', '${s}')" class="card bg-orange-50 p-4 rounded-2xl font-bold border-2 border-orange-200">${s}</button>`
            ).join('');
        }

        function selectTopic(grade, sub) {
            document.getElementById('topic-panel').classList.remove('hidden');
            const topics = [...new Set(fullCurriculum.filter(r => r.Grade === grade && r.Subject === sub).map(r => r.Topic))];
            document.getElementById('topic-list').innerHTML = topics.map(t => 
                `<button onclick="loadAndStart('${grade}', '${t}')" class="card bg-green-50 p-4 rounded-2xl font-bold border-2 border-green-200">${t}</button>`
            ).join('');
        }

        async function loadAndStart(grade, topic) {
            document.getElementById('nav-container').classList.add('hidden');
            document.getElementById('quiz-zone').classList.remove('hidden');
            document.getElementById('score-bar').classList.remove('hidden');
            document.getElementById('quiz-content').innerHTML = "正在載入題目，請稍候...";

            // 檢查快取
            if (!window.cachedData || window.currentGrade !== grade) {
                const res = await fetch(`${API_URL}?sheet=Q_${grade}`);
                window.cachedData = await res.json();
                window.currentGrade = grade;
            }
            
            // 隨機抽題：從篩
