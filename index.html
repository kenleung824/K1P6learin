<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>🍎 學習冒險王</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');
        body { font-family: 'Fredoka', sans-serif; background: #f0f4f8; }
        .card { transition: transform 0.2s; }
        .card:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-teal-700">🍎 學習冒險</h1>
            <div id="score-bar" class="hidden text-xl font-bold text-orange-500 bg-white px-6 py-2 rounded-full shadow-md">
                🥕 紅蘿蔔: <span id="score">0</span>
            </div>
        </div>

        <div id="nav-container" class="space-y-6">
            <div id="grade-panel" class="bg-white p-6 rounded-3xl shadow-lg border-t-8 border-blue-400">
                <h2 class="text-xl font-bold mb-4">🎒 1. 請選年級</h2>
                <div class="grid grid-cols-2 gap-4" id="grade-list"></div>
            </div>
            <div id="subject-panel" class="hidden bg-white p-6 rounded-3xl shadow-lg border-t-8 border-orange-400">
                <h2 class="text-xl font-bold mb-4">📚 2. 請選科目</h2>
                <div id="subject-list" class="grid grid-cols-2 gap-4"></div>
            </div>
            <div id="topic-panel" class="hidden bg-white p-6 rounded-3xl shadow-lg border-t-8 border-green-400">
                <h2 class="text-xl font-bold mb-4">🎯 3. 請選課題</h2>
                <div id="topic-list" class="grid grid-cols-1 gap-4"></div>
            </div>
        </div>

        <div id="quiz-zone" class="hidden bg-white p-8 rounded-3xl shadow-xl">
            <button onclick="location.reload()" class="mb-6 px-6 py-2 bg-gray-100 rounded-full font-bold hover:bg-gray-200">⬅️ 返回選單</button>
            <div id="quiz-content"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx6sc4HQAhdyZpKCYcMdvS8HuUgvTgmuvhJTfzgMi33csL7YF82jOoGvtHnEAf-SHoC/exec";
        let score = 0, currentQuestions = [], gradeData = [];

        // 初始化
        fetch(API_URL + "?sheet=Curriculum")
            .then(res => res.json())
            .then(data => {
                const grades = [...new Set(data.map(r => r.Grade))];
                grades.forEach(g => {
                    document.getElementById('grade-list').innerHTML += `<button onclick="selectGrade('${g}')" class="card bg-blue-50 p-4 rounded-2xl font-bold text-blue-700 border-2 border-blue-200">${g}</button>`;
                });
            });

        function selectGrade(grade) {
            document.getElementById('subject-panel').classList.remove('hidden');
            fetch(`${API_URL}?sheet=Q_${grade}`).then(res => res.json()).then(data => {
                gradeData = data; 
                const subs = [...new Set(data.map(r => r.Subject))];
                const list = document.getElementById('subject-list');
                list.innerHTML = '';
                subs.forEach(s => {
                    list.innerHTML += `<button onclick="selectTopic('${s}')" class="card bg-orange-50 p-4 rounded-2xl font-bold text-orange-700 border-2 border-orange-200">${s}</button>`;
                });
            });
        }

        // 新增課題選單
        function selectTopic(sub) {
            document.getElementById('topic-panel').classList.remove('hidden');
            const topics = [...new Set(gradeData.filter(r => r.Subject === sub).map(r => r.Topic))];
            const list = document.getElementById('topic-list');
            list.innerHTML = '';
            topics.forEach(t => {
                list.innerHTML += `<button onclick="startQuiz('${sub}', '${t}')" class="card bg-green-50 p-4 rounded-2xl font-bold text-green-700 border-2 border-green-200">${t}</button>`;
            });
        }

        function startQuiz(sub, topic) {
            document.getElementById('nav-container').classList.add('hidden');
            document.getElementById('quiz-zone').classList.remove('hidden');
            document.getElementById('score-bar').classList.remove('hidden');
            
            // 篩選出科目與課題都符合的題目
            currentQuestions = gradeData.filter(r => r.Subject === sub && r.Topic === topic)
                                        .sort(() => 0.5 - Math.random()).slice(0, 20);
            renderQuestion(0);
        }

        function renderQuestion(idx) {
            if (idx >= currentQuestions.length) {
                document.getElementById('quiz-content').innerHTML = `<h2 class="text-3xl text-center">🎉 練習結束！總分: ${score}</h2>`;
                return;
            }
            const q = currentQuestions[idx];
            const options = [q.Option_A, q.Option_B, q.Option_C, q.Option_D].filter(o => o);
            document.getElementById('quiz-content').innerHTML = `
                <p class="text-sm text-gray-400 mb-2">第 ${idx + 1} / ${currentQuestions.length} 題</p>
                <h2 class="text-2xl font-bold mb-6">${q.Question}</h2>
                <div class="grid grid-cols-1 gap-4">
                    ${options.map(opt => `<button onclick="check('${opt}', '${q.Correct}', ${idx}, this)" class="card p-5 rounded-2xl border-2 hover:bg-blue-50">${opt}</button>`).join('')}
                </div>
            `;
        }

        function check(sel, cor, idx, btn) {
            if (sel.trim() === cor.trim()) {
                score += 10;
                document.getElementById('score').innerText = score;
                btn.classList.add('bg-green-200');
                setTimeout(() => renderQuestion(idx + 1), 500);
            } else {
                btn.classList.add('bg-red-200');
                setTimeout(() => btn.classList.remove('bg-red-200'), 500);
            }
        }
    </script>
</body>
</html>
